name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # 每天 UTC 时间 02:00（北京时间 10:00）自动构建
    - cron: '0 2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cliproxyapi-pro-custom:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cliproxyapi-pro-custom:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/cliproxyapi-pro-custom:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/cliproxyapi-pro-custom:buildcache,mode=max
